<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 630 500" width="630" height="500">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#14192b" />
      <stop offset="100%" stop-color="#07090f" />
    </radialGradient>

    <!-- Neon Gradients -->
    <linearGradient id="neon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="50%" stop-color="#bd00ff" />
      <stop offset="100%" stop-color="#ff0055" />
    </linearGradient>

    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffaa00" />
      <stop offset="100%" stop-color="#ffee55" />
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.04" />
    </pattern>

    <!-- Glow Filters -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="630" height="500" fill="url(#bg-grad)" />
  <rect width="630" height="500" fill="url(#grid)" />

  <!-- Diagonal Tech Accents -->
  <path d="M -100 150 L 730 -50 L 730 0 L -100 200 Z" fill="url(#neon-grad)" opacity="0.08" />
  <path d="M -100 350 L 730 150 L 730 160 L -100 360 Z" fill="#00f0ff" opacity="0.2" filter="url(#glow-cyan)" />
  <path d="M -100 100 L 730 -150 L 730 -140 L -100 110 Z" fill="#bd00ff" opacity="0.2" filter="url(#glow-purple)" />

  <!-- Abstract Case / Circuit Graphic (Center-Right) -->
  <g transform="translate(360, 150)" opacity="0.85">
    <!-- Outer Case Frame -->
    <rect x="0" y="0" width="210" height="240" rx="12" fill="none" stroke="url(#neon-grad)" stroke-width="3" filter="url(#glow-purple)" />
    <rect x="-10" y="240" width="230" height="8" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1" />
    
    <!-- Motherboard block inside -->
    <rect x="30" y="20" width="150" height="150" rx="6" fill="#0f172a" stroke="#ffffff" stroke-width="1" opacity="0.1" />
    
    <!-- CPU Slot with glowing lines -->
    <rect x="85" y="45" width="40" height="40" rx="4" fill="#0a0d16" stroke="#00f0ff" stroke-width="1.5" />
    <text x="105" y="69" fill="#00f0ff" font-family="monospace" font-size="9" text-anchor="middle" font-weight="bold">CPU</text>
    
    <!-- RAM slots -->
    <line x1="135" y1="40" x2="135" y2="90" stroke="#bd00ff" stroke-width="2" opacity="0.8" />
    <line x1="140" y1="40" x2="140" y2="90" stroke="#bd00ff" stroke-width="2" opacity="0.8" />
    <line x1="145" y1="40" x2="145" y2="90" stroke="#bd00ff" stroke-width="2" opacity="0.8" />
    <line x1="150" y1="40" x2="150" y2="90" stroke="#bd00ff" stroke-width="2" opacity="0.8" />

    <!-- GPU block -->
    <rect x="20" y="110" width="170" height="35" rx="4" fill="#1e1b4b" stroke="#bd00ff" stroke-width="1.5" />
    <text x="105" y="132" fill="#bd00ff" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold" filter="url(#glow-purple)">RTX ACTIVE</text>

    <!-- PSU block -->
    <rect x="30" y="185" width="150" height="45" rx="4" fill="#020617" stroke="#00ff88" stroke-width="1.5" />
    <text x="105" y="212" fill="#00ff88" font-family="monospace" font-size="10" text-anchor="middle" font-weight="bold">PSU 1000W</text>
    
    <!-- Grid Circuit Lines -->
    <path d="M 85 65 L 50 65 L 50 110" fill="none" stroke="#00f0ff" stroke-width="1" opacity="0.5" />
    <path d="M 125 65 L 135 65" fill="none" stroke="#00f0ff" stroke-width="1" opacity="0.5" />
    <path d="M 105 85 L 105 110" fill="none" stroke="#00f0ff" stroke-width="1" opacity="0.5" />
  </g>

  <!-- Title & Branding (Left Side) -->
  <g transform="translate(50, 150)">
    <!-- Brand glow background -->
    <text x="0" y="30" fill="#00f0ff" font-family="system-ui, sans-serif" font-size="34" font-weight="900" letter-spacing="1" filter="url(#glow-cyan)">PC ARCHITECT</text>
    <text x="0" y="30" fill="#ffffff" font-family="system-ui, sans-serif" font-size="34" font-weight="900" letter-spacing="1">PC ARCHITECT</text>
    
    <text x="0" y="75" fill="#bd00ff" font-family="system-ui, sans-serif" font-size="44" font-weight="900" letter-spacing="5" filter="url(#glow-purple)">TYCOON</text>
    <text x="0" y="75" fill="url(#gold-grad)" font-family="system-ui, sans-serif" font-size="44" font-weight="900" letter-spacing="5">TYCOON</text>

    <text x="0" y="115" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="1" opacity="0.8">THE HARDWARE ASSEMBLY SIMULATOR</text>

    <!-- Features badge grid -->
    <g transform="translate(0, 140)">
      <!-- Badge 1 -->
      <rect x="0" y="0" width="115" height="24" rx="4" fill="rgba(0, 240, 255, 0.08)" stroke="#00f0ff" stroke-width="1" />
      <text x="57" y="15" fill="#00f0ff" font-family="system-ui, sans-serif" font-size="9" font-weight="700" text-anchor="middle">HTML5 PLAY IN BROWSER</text>

      <!-- Badge 2 -->
      <rect x="125" y="0" width="115" height="24" rx="4" fill="rgba(189, 0, 255, 0.08)" stroke="#bd00ff" stroke-width="1" />
      <text x="182" y="15" fill="#bd00ff" font-family="system-ui, sans-serif" font-size="9" font-weight="700" text-anchor="middle">VIRTUAL OS SIMULATOR</text>

      <!-- Badge 3 -->
      <rect x="0" y="32" width="115" height="24" rx="4" fill="rgba(0, 255, 136, 0.08)" stroke="#00ff88" stroke-width="1" />
      <text x="57" y="47" fill="#00ff88" font-family="system-ui, sans-serif" font-size="9" font-weight="700" text-anchor="middle">PRECISION OVERCLOCK</text>

      <!-- Badge 4 -->
      <rect x="125" y="32" width="115" height="24" rx="4" fill="rgba(255, 170, 0, 0.08)" stroke="#ffaa00" stroke-width="1" />
      <text x="182" y="47" fill="#ffaa00" font-family="system-ui, sans-serif" font-size="9" font-weight="700" text-anchor="middle">PRESTIGE SHOWROOM</text>
    </g>
  </g>

  <!-- Header Decoration -->
  <line x1="50" y1="50" x2="580" y2="50" stroke="url(#neon-grad)" stroke-width="1.5" opacity="0.4" />
  <rect x="50" y="46" width="30" height="8" fill="#00f0ff" opacity="0.8" />
  <rect x="550" y="46" width="30" height="8" fill="#bd00ff" opacity="0.8" />
</svg>